name: Build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # The coach brain is pure JVM with no Android dependencies, so it tests in ~30 seconds
  # without an emulator. This is the gate that actually means something: if DominanceTest
  # goes red, the product is inverted and nothing else matters.
  brain:
    name: Coach brain (pure JVM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Coach brain tests
        run: ./gradlew :coach:test --stacktrace

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coach-test-report
          path: coach/build/reports/tests/test/
          if-no-files-found: ignore

  apk:
    name: APK
    runs-on: ubuntu-latest
    needs: brain
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Sonora hand-edits versionCode/versionName and keeps them in sync with the tag by hand,
      # which desyncs. Derive both from the tag instead; untagged builds get a dev version.
      - name: Derive version from tag
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            NAME="${GITHUB_REF#refs/tags/v}"
          else
            NAME="0.0.0-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "code=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Building ${NAME} (code ${GITHUB_RUN_NUMBER})"

      # Release signing only when the secret exists. Absent -> debug signing, so forks and PRs
      # always build rather than red-X for a reason unrelated to their change.
      # NOTE: every release must share one key or in-app updates fail to install (signature
      # mismatch). Sonora learned this the hard way.
      - name: Configure release signing (if secrets present)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/upload.jks"
            {
              echo "storeFile=$RUNNER_TEMP/upload.jks"
              echo "storePassword=$KEYSTORE_PASSWORD"
              echo "keyAlias=$KEY_ALIAS"
              echo "keyPassword=$KEY_PASSWORD"
            } > keystore.properties
            echo "Release signing configured (stable key)."
          else
            echo "No keystore secret - release will be debug-signed."
          fi

      - name: Build release APK
        run: >
          ./gradlew :app:assembleRelease --stacktrace
          -PversionName=${{ steps.version.outputs.name }}
          -PversionCode=${{ steps.version.outputs.code }}

      # The README's headline claim is "on-device, no account, no cloud, no network". That claim was
      # FALSE on the first build: the manifest merger pulled INTERNET in from ML Kit and from
      # transport-backend-cct (Google's telemetry uploader). It is removed in AndroidManifest.xml —
      # this gate is what stops a future dependency from quietly merging it back and making the
      # README a lie. A privacy promise nothing enforces is a wish.
      - name: No network permission (the README stakes its name on this)
        run: |
          AAPT=$(ls "$ANDROID_HOME"/build-tools/*/aapt2 | sort -V | tail -1)
          PERMS=$("$AAPT" dump badging app/build/outputs/apk/release/app-release.apk | grep uses-permission || true)
          echo "$PERMS"
          if echo "$PERMS" | grep -qE "android.permission.(INTERNET|ACCESS_NETWORK_STATE)"; then
            echo "::error::APK requests a network permission. Either remove it, or the README is lying."
            exit 1
          fi
          echo "OK: no INTERNET, no ACCESS_NETWORK_STATE."

      # The clinical guardrail that is enforced by an absence rather than a flag: there is no
      # is_healthy/calorie/macro column in the schema. A flag can be unwritten at 1am; a column that
      # does not exist cannot be conjured. Room exports the schema JSON so this can be checked.
      - name: No food-judgment columns in the schema
        run: |
          if grep -rniE '"(is_healthy|calorie|calories|macro|food_verdict|bmi|goal_weight)"' app/schemas/ 2>/dev/null; then
            echo "::error::A food/weight-judgment column entered the schema. This is a clinical guardrail, not a preference."
            exit 1
          fi
          echo "OK: no food-judgment columns."

      - name: Stage APK
        run: cp app/build/outputs/apk/release/app-release.apk second-spine-${{ steps.version.outputs.name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: second-spine-apk
          path: second-spine-*.apk

      - name: Attach APK to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: second-spine-*.apk
          generate_release_notes: true
